name: Issue assignment

on:
  issues:
    types: [opened, edited]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 'Auto-assign issue'
        uses: pozil/auto-assign-issue@v2.2.0
        with:
          assignees: dschach
          numOfAssignee: 1
          allowSelfAssign: true
